<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>String Eşleştirme Algoritmaları - Adım Adım</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #555;
      margin-bottom: 24px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 16px;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    button:hover {
      background: #1d4ed8;
    }

    button.secondary {
      background: #64748b;
    }

    button.secondary:hover {
      background: #475569;
    }

    button:disabled {
      background: #bbb;
      cursor: not-allowed;
    }

    .visual-area {
      background: #f9fafb;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      overflow-x: auto;
    }

    .row {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      min-height: 42px;
    }

    .row-label {
      width: 90px;
      font-weight: bold;
      flex-shrink: 0;
    }

    .chars {
      display: flex;
      gap: 4px;
    }

    .char-box {
      width: 36px;
      height: 36px;
      border: 1px solid #aaa;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      background: white;
      position: relative;
    }

    .index {
      position: absolute;
      top: -18px;
      font-size: 11px;
      color: #666;
      font-weight: normal;
    }

    .empty-box {
      width: 36px;
      height: 36px;
      margin-right: 4px;
    }

    .compare {
      background: #fde68a;
      border-color: #f59e0b;
    }

    .match {
      background: #bbf7d0;
      border-color: #16a34a;
    }

    .mismatch {
      background: #fecaca;
      border-color: #dc2626;
    }

    .found {
      background: #bfdbfe;
      border-color: #2563eb;
    }

    .info-panel {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 14px;
      background: #fafafa;
    }

    .card h3 {
      margin-top: 0;
      margin-bottom: 8px;
    }

    .log {
      background: #111827;
      color: #e5e7eb;
      padding: 14px;
      border-radius: 10px;
      min-height: 140px;
      max-height: 250px;
      overflow-y: auto;
      font-family: Consolas, monospace;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .result {
      font-weight: bold;
      color: #166534;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 14px;
    }

    .table th, .table td {
      border: 1px solid #ddd;
      padding: 6px;
      text-align: center;
    }

    .table th {
      background: #e5e7eb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>String Eşleştirme Algoritmaları</h1>
    <p class="subtitle">Naive, KMP, Boyer-Moore ve Rabin-Karp algoritmalarını adım adım çalıştır.</p>

    <div class="controls">
      <div>
        <label for="textInput">Metin</label>
        <input id="textInput" value="ABABCABAB" />
      </div>

      <div>
        <label for="patternInput">Örüntü</label>
        <input id="patternInput" value="ABAB" />
      </div>

      <div>
        <label for="algorithmSelect">Algoritma</label>
        <select id="algorithmSelect">
          <option value="naive">Brute Force / Naive</option>
          <option value="kmp">Knuth-Morris-Pratt (KMP)</option>
          <option value="boyer">Boyer-Moore</option>
          <option value="rabin">Rabin-Karp</option>
        </select>
      </div>
    </div>

    <div class="buttons">
      <button onclick="prepareAlgorithm()">Hazırla</button>
      <button onclick="nextStep()" id="nextBtn" disabled>Bir Adım İlerle</button>
      <button onclick="autoRun()" id="autoBtn" disabled>Otomatik Çalıştır</button>
      <button onclick="resetAll()" class="secondary">Sıfırla</button>
    </div>

    <div class="visual-area" id="visualArea"></div>

    <div class="info-panel">
      <div class="card">
        <h3>Anlık Bilgi</h3>
        <p id="stepInfo">Algoritmayı başlatmak için Hazırla butonuna bas.</p>
      </div>

      <div class="card">
        <h3>Bulunan Eşleşmeler</h3>
        <p id="matches" class="result">Henüz yok.</p>
      </div>

      <div class="card">
        <h3>Ek Tablo / Ön İşleme</h3>
        <div id="extraInfo">Seçilen algoritmaya göre burada tablo gösterilir.</div>
      </div>
    </div>

    <h3>İşlem Günlüğü</h3>
    <div class="log" id="logArea"></div>
  </div>

  <script>
    let text = "";
    let pattern = "";
    let algorithm = "naive";
    let steps = [];
    let currentStep = -1;
    let foundMatches = [];
    let timer = null;

    function prepareAlgorithm() {
      text = document.getElementById("textInput").value;
      pattern = document.getElementById("patternInput").value;
      algorithm = document.getElementById("algorithmSelect").value;

      if (!text || !pattern) {
        alert("Metin ve örüntü boş olamaz.");
        return;
      }

      if (pattern.length > text.length) {
        alert("Örüntü metinden uzun olamaz.");
        return;
      }

      steps = [];
      currentStep = -1;
      foundMatches = [];
      clearInterval(timer);

      if (algorithm === "naive") generateNaiveSteps();
      if (algorithm === "kmp") generateKMPSteps();
      if (algorithm === "boyer") generateBoyerMooreSteps();
      if (algorithm === "rabin") generateRabinKarpSteps();

      document.getElementById("nextBtn").disabled = false;
      document.getElementById("autoBtn").disabled = false;
      document.getElementById("logArea").textContent = "Algoritma hazırlandı. Bir adım ilerleyin.\n";
      document.getElementById("matches").textContent = "Henüz yok.";
      document.getElementById("stepInfo").textContent = "Toplam adım sayısı: " + steps.length;
      renderVisual(null);
      renderExtraInfo();
    }

    function nextStep() {
      if (currentStep + 1 >= steps.length) {
        document.getElementById("stepInfo").textContent = "Algoritma tamamlandı.";
        document.getElementById("nextBtn").disabled = true;
        document.getElementById("autoBtn").disabled = true;
        clearInterval(timer);
        return;
      }

      currentStep++;
      const step = steps[currentStep];

      if (step.found && !foundMatches.includes(step.shift)) {
        foundMatches.push(step.shift);
      }

      renderVisual(step);
      updateInfo(step);
      appendLog(step.message);
    }

    function autoRun() {
      clearInterval(timer);
      timer = setInterval(() => {
        if (currentStep + 1 >= steps.length) {
          clearInterval(timer);
          document.getElementById("stepInfo").textContent = "Algoritma tamamlandı.";
          document.getElementById("nextBtn").disabled = true;
          document.getElementById("autoBtn").disabled = true;
        } else {
          nextStep();
        }
      }, 800);
    }

    function resetAll() {
      steps = [];
      currentStep = -1;
      foundMatches = [];
      clearInterval(timer);
      document.getElementById("visualArea").innerHTML = "";
      document.getElementById("logArea").textContent = "";
      document.getElementById("stepInfo").textContent = "Algoritmayı başlatmak için Hazırla butonuna bas.";
      document.getElementById("matches").textContent = "Henüz yok.";
      document.getElementById("extraInfo").textContent = "Seçilen algoritmaya göre burada tablo gösterilir.";
      document.getElementById("nextBtn").disabled = true;
      document.getElementById("autoBtn").disabled = true;
    }

    function generateNaiveSteps() {
      for (let i = 0; i <= text.length - pattern.length; i++) {
        let matched = true;

        for (let j = 0; j < pattern.length; j++) {
          const isMatch = text[i + j] === pattern[j];

          steps.push({
            algorithm: "Naive",
            shift: i,
            textIndex: i + j,
            patternIndex: j,
            match: isMatch,
            found: false,
            message: `Naive: i=${i}, j=${j}. '${text[i + j]}' ile '${pattern[j]}' karşılaştırıldı. ${isMatch ? "Eşleşti." : "Eşleşmedi."}`
          });

          if (!isMatch) {
            matched = false;
            break;
          }
        }

        if (matched) {
          steps.push({
            algorithm: "Naive",
            shift: i,
            textIndex: -1,
            patternIndex: -1,
            match: true,
            found: true,
            message: `Naive: Örüntü bulundu. Başlangıç konumu: ${i}`
          });
        }
      }
    }

    function buildLPS(pat) {
      const lps = Array(pat.length).fill(0);
      let len = 0;
      let i = 1;

      while (i < pat.length) {
        if (pat[i] === pat[len]) {
          len++;
          lps[i] = len;
          i++;
        } else {
          if (len !== 0) {
            len = lps[len - 1];
          } else {
            lps[i] = 0;
            i++;
          }
        }
      }
      return lps;
    }

    function generateKMPSteps() {
      const lps = buildLPS(pattern);
      let i = 0;
      let j = 0;

      while (i < text.length) {
        const isMatch = text[i] === pattern[j];

        steps.push({
          algorithm: "KMP",
          shift: i - j,
          textIndex: i,
          patternIndex: j,
          match: isMatch,
          found: false,
          lps,
          message: `KMP: text[${i}]='${text[i]}' ile pattern[${j}]='${pattern[j]}' karşılaştırıldı. ${isMatch ? "Eşleşti." : "Eşleşmedi."}`
        });

        if (isMatch) {
          i++;
          j++;
        }

        if (j === pattern.length) {
          const pos = i - j;
          steps.push({
            algorithm: "KMP",
            shift: pos,
            textIndex: -1,
            patternIndex: -1,
            match: true,
            found: true,
            lps,
            message: `KMP: Örüntü bulundu. Başlangıç konumu: ${pos}. j değeri LPS ile güncellendi.`
          });
          j = lps[j - 1];
        } else if (i < text.length && !isMatch) {
          if (j !== 0) {
            const oldJ = j;
            j = lps[j - 1];
            steps.push({
              algorithm: "KMP",
              shift: i - j,
              textIndex: i,
              patternIndex: j,
              match: false,
              found: false,
              lps,
              message: `KMP: Eşleşme bozuldu. j=${oldJ} yerine LPS tablosundan j=${j} yapıldı. Metin indeksi geri alınmadı.`
            });
          } else {
            i++;
            steps.push({
              algorithm: "KMP",
              shift: i,
              textIndex: i,
              patternIndex: 0,
              match: false,
              found: false,
              lps,
              message: `KMP: j=0 olduğu için metinde bir sonraki karaktere geçildi.`
            });
          }
        }
      }
    }

    function buildBadCharTable(pat) {
      const table = {};
      for (let i = 0; i < pat.length; i++) {
        table[pat[i]] = i;
      }
      return table;
    }

    function generateBoyerMooreSteps() {
      const badChar = buildBadCharTable(pattern);
      let shift = 0;

      while (shift <= text.length - pattern.length) {
        let j = pattern.length - 1;

        while (j >= 0) {
          const isMatch = pattern[j] === text[shift + j];

          steps.push({
            algorithm: "Boyer-Moore",
            shift,
            textIndex: shift + j,
            patternIndex: j,
            match: isMatch,
            found: false,
            badChar,
            message: `Boyer-Moore: Sağdan sola karşılaştırma. text[${shift + j}]='${text[shift + j]}' ile pattern[${j}]='${pattern[j]}'. ${isMatch ? "Eşleşti." : "Eşleşmedi."}`
          });

          if (!isMatch) break;
          j--;
        }

        if (j < 0) {
          steps.push({
            algorithm: "Boyer-Moore",
            shift,
            textIndex: -1,
            patternIndex: -1,
            match: true,
            found: true,
            badChar,
            message: `Boyer-Moore: Örüntü bulundu. Başlangıç konumu: ${shift}`
          });
          shift += 1;
        } else {
          const badCharacter = text[shift + j];
          const lastIndex = badChar[badCharacter] ?? -1;
          const move = Math.max(1, j - lastIndex);

          steps.push({
            algorithm: "Boyer-Moore",
            shift: shift + move,
            textIndex: shift + j,
            patternIndex: j,
            match: false,
            found: false,
            badChar,
            message: `Boyer-Moore: Kötü karakter '${badCharacter}'. Son konumu=${lastIndex}. Kaydırma miktarı=${move}. Yeni başlangıç=${shift + move}.`
          });

          shift += move;
        }
      }
    }

    function simpleHash(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash += str.charCodeAt(i);
      }
      return hash;
    }

    function generateRabinKarpSteps() {
      const m = pattern.length;
      const patternHash = simpleHash(pattern);

      for (let i = 0; i <= text.length - m; i++) {
        const sub = text.substring(i, i + m);
        const subHash = simpleHash(sub);
        const hashMatch = subHash === patternHash;

        steps.push({
          algorithm: "Rabin-Karp",
          shift: i,
          textIndex: -1,
          patternIndex: -1,
          match: hashMatch,
          found: false,
          patternHash,
          subHash,
          message: `Rabin-Karp: '${sub}' alt dizgisinin hash değeri ${subHash}. Örüntü hash değeri ${patternHash}. ${hashMatch ? "Hash eşleşti, doğrulama yapılacak." : "Hash eşleşmedi."}`
        });

        if (hashMatch) {
          let exact = true;
          for (let j = 0; j < m; j++) {
            const isMatch = text[i + j] === pattern[j];
            steps.push({
              algorithm: "Rabin-Karp",
              shift: i,
              textIndex: i + j,
              patternIndex: j,
              match: isMatch,
              found: false,
              patternHash,
              subHash,
              message: `Rabin-Karp doğrulama: text[${i + j}]='${text[i + j]}' ile pattern[${j}]='${pattern[j]}'. ${isMatch ? "Eşleşti." : "Eşleşmedi."}`
            });

            if (!isMatch) {
              exact = false;
              break;
            }
          }

          if (exact) {
            steps.push({
              algorithm: "Rabin-Karp",
              shift: i,
              textIndex: -1,
              patternIndex: -1,
              match: true,
              found: true,
              patternHash,
              subHash,
              message: `Rabin-Karp: Örüntü bulundu. Başlangıç konumu: ${i}`
            });
          }
        }
      }
    }

    function renderVisual(step) {
      const area = document.getElementById("visualArea");
      area.innerHTML = "";

      const textRow = document.createElement("div");
      textRow.className = "row";
      textRow.innerHTML = '<div class="row-label">Metin</div>';

      const textChars = document.createElement("div");
      textChars.className = "chars";

      for (let i = 0; i < text.length; i++) {
        const box = document.createElement("div");
        box.className = "char-box";
        box.textContent = text[i];

        const idx = document.createElement("span");
        idx.className = "index";
        idx.textContent = i;
        box.appendChild(idx);

        if (step && i === step.textIndex) {
          box.classList.add(step.match ? "match" : "mismatch");
        }

        if (step && step.found && i >= step.shift && i < step.shift + pattern.length) {
          box.classList.add("found");
        }

        textChars.appendChild(box);
      }

      textRow.appendChild(textChars);
      area.appendChild(textRow);

      const patternRow = document.createElement("div");
      patternRow.className = "row";
      patternRow.innerHTML = '<div class="row-label">Örüntü</div>';

      const patternChars = document.createElement("div");
      patternChars.className = "chars";

      const shift = step ? Math.max(0, step.shift) : 0;
      for (let s = 0; s < shift; s++) {
        const empty = document.createElement("div");
        empty.className = "empty-box";
        patternChars.appendChild(empty);
      }

      for (let j = 0; j < pattern.length; j++) {
        const box = document.createElement("div");
        box.className = "char-box";
        box.textContent = pattern[j];

        if (step && j === step.patternIndex) {
          box.classList.add(step.match ? "match" : "mismatch");
        }

        if (step && step.found) {
          box.classList.add("found");
        }

        patternChars.appendChild(box);
      }

      patternRow.appendChild(patternChars);
      area.appendChild(patternRow);
    }

    function updateInfo(step) {
      document.getElementById("stepInfo").textContent = `Adım ${currentStep + 1}/${steps.length}: ${step.algorithm}`;
      document.getElementById("matches").textContent = foundMatches.length
        ? "Başlangıç konumları: " + foundMatches.join(", ")
        : "Henüz yok.";
    }

    function appendLog(message) {
      const log = document.getElementById("logArea");
      log.textContent += message + "\n";
      log.scrollTop = log.scrollHeight;
    }

    function renderExtraInfo() {
      const extra = document.getElementById("extraInfo");

      if (algorithm === "naive") {
        extra.innerHTML = "Ön işleme yoktur. Her olası başlangıç konumu denenir.";
      }

      if (algorithm === "kmp") {
        const lps = buildLPS(pattern);
        extra.innerHTML = createArrayTable(pattern.split(""), lps, "Karakter", "LPS");
      }

      if (algorithm === "boyer") {
        const table = buildBadCharTable(pattern);
        let html = '<table class="table"><tr><th>Karakter</th><th>Örüntüdeki son konum</th></tr>';
        for (const ch in table) {
          html += `<tr><td>${ch}</td><td>${table[ch]}</td></tr>`;
        }
        html += "</table>";
        extra.innerHTML = html;
      }

      if (algorithm === "rabin") {
        extra.innerHTML = `Örüntü hash değeri: <b>${simpleHash(pattern)}</b><br>Not: Bu örnekte basit ASCII toplamı kullanılmıştır.`;
      }
    }

    function createArrayTable(chars, values, head1, head2) {
      let html = `<table class="table"><tr><th>İndeks</th><th>${head1}</th><th>${head2}</th></tr>`;
      for (let i = 0; i < chars.length; i++) {
        html += `<tr><td>${i}</td><td>${chars[i]}</td><td>${values[i]}</td></tr>`;
      }
      html += "</table>";
      return html;
    }
  </script>
</body>
</html>
